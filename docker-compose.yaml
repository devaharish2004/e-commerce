version: '3.9'

services:

  postgres:
    image: postgres:latest
    container_name: ecommerce-postgres

    environment:
      POSTGRES_USER: devaharish
      POSTGRES_PASSWORD: devaharish
      POSTGRES_DB: ecommerce_db

    ports:
      - "5432:5432"

    volumes:
      - postgres-data:/var/lib/postgresql/data

    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: ecommerce-pgadmin

    environment:
      PGADMIN_DEFAULT_EMAIL: devaharish@ecommerce.com
      PGADMIN_DEFAULT_PASSWORD: devaharish

    ports:
      - "5050:80"

    depends_on:
      - postgres

    restart: unless-stopped

volumes:
  postgres-data: